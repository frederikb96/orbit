<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Orbit - Claude Transcript Viewer</title>
	<link rel="stylesheet" href="/style.css">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x25C9;</text></svg>">
	<script>
		// Prevent flash of wrong theme on page load
		(function() {
			var stored = localStorage.getItem('orbit-theme');
			var theme = stored || 'system';
			if (theme === 'system') {
				theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
			}
			document.documentElement.setAttribute('data-theme', theme);
		})();
	</script>
</head>
<body>
	<div id="root"></div>
	<script type="module" src="/bundle.js"></script>
</body>
</html>
